algorithm: morlax
backend: np
description: ''
env: MOCheetah
env_config:
  action_scale: 1.0
  add_random_joint_state: false
  add_random_pitch: false
  ctrl_dt: 0.01
  history_length: 5
  ideal_base_height: 0.5
  ideal_base_vel: 0.5
  min_base_height: 0.3
  reward:
    optimization:
      labels:
      - Running Speed
      - Energy Efficiency
      - Height
      objectives:
      - - run
      - - energy
      - - height
      shared_objectives:
      - alive
    sigmas:
      energy: 0.1
      height: 0.01
      imitation: 0.03
      speed: 0.01
    weights:
      alive: 1.0
      done: 0
      energy: 1.0
      height: 10.0
      run: 1.0
  sim_dt: 0.01
  termination:
    base_height: 0.2
    enabled: true
learning_params:
  hypermorl_params:
    alpha: 1.0
    k: 8
    sampling: sparse-heavytail
    warmup_frac: 0.0
  hypernetwork_params:
    hypersize:
    - 128
    - 128
    hypertype: ActorCritic
    num_features: 16
  network_params:
    policy_hidden_layer_sizes:
    - 64
    - 64
    value_hidden_layer_sizes:
    - 64
    - 64
  ppo_params:
    action_repeat: 1
    batch_size: 64
    clipping_epsilon: 0.1
    deterministic_eval: true
    discounting: 0.98
    entropy_cost: 0.01
    episode_length: 500
    learning_rate: 0.0005
    max_grad_norm: 1.0
    normalize_observations: true
    num_envs: 128
    num_evals: 15
    num_minibatches: 2
    num_timesteps: 50000000
    num_updates_per_batch: 4
    reward_scaling: 1.0
    unroll_length: 20
  warmup_params:
    enabled: false
    policy: playground-results/SO-MOCheetah/a-good-policy/config.yaml
mo2so:
  enabled: false
  weighting:
  - 0.5
  - 0.5
name: test
save_dir: accepted-results/may/3/
